# 3D POD + BiTCN default config.
#
# Quarter-symmetry: the simulation assumes 90-degree rotational symmetry
# about the z axis, so the data and the canonical grid both cover only
# the first quadrant (x, y in [0, 1]). Sensor positions are (r, theta_deg)
# pairs with theta in [0, 90]; the rig is also configured this way, so the
# three edge sensors below (X axis, +D diagonal, Y axis) map 1:1 onto real
# physical sensors at validation time.

data:
  npz_dir: "REPLACE_WITH/dataset3d_npz"
  nx: 128
  ny: 128
  nt: 300
  x_end: 1.0
  y_end: 1.0
  t_end: 1.0
  train_frac: 0.80
  seed: 7
  limit: null

pod:
  k: 8

sensors:
  n: 3
  strategy: custom
  positions:
    - [1.0, 0.0]      # +X edge
    - [1.0, 45.0]     # +D edge
    - [1.0, 90.0]     # +Y edge

model:
  arch: bitcn
  channels: 64
  kernel: 3
  dilations: [1, 2, 4, 8, 16, 32, 64]
  dropout: 0.05
  causal: false

train:
  epochs: 200
  batch_size: 32
  lr_init: 0.001
  lr_final: 0.00001
  lr_schedule: cosine
  weight_decay: 0.0
  val_frac: 0.10
  sensor_noise: 0.0
  grad_clip: 1.0
  weight_scheme: sigma
  print_every: 25

seeds: [7, 17, 27]
output_dir: outputs
tag: real3d
